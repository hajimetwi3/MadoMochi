name: macOS sandbox test

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-sandbox-test
  cancel-in-progress: true

jobs:
  test-macos-apply:
    # リポジトリ所有者が手動実行した場合のみ動かす
    if: github.actor == github.repository_owner

    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6 tag target, verified 2026-07-21
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6 tag target, verified 2026-07-21
        with:
          python-version: "3.10"

      - name: Show environment
        run: |
          sw_vers
          uname -m
          python --version

      - name: Run isolated apply and undo tests
        run: python -B tests/test_macos_apply.py

      - name: Run multi-session state tests
        run: python -B tests/test_session_state.py

      - name: Apply experimental macOS layer
        id: apply_macos
        run: python experimental/macos/apply.py

      - name: Run patched unit tests
        run: python -B tests/test_units.py

      - name: Restore stock checkout
        if: always() && steps.apply_macos.outcome == 'success'
        run: python experimental/macos/apply.py --undo

      - name: Confirm no test sandbox remains
        if: always()
        shell: bash
        run: |
          shopt -s nullglob
          leftovers=(
            "${TMPDIR:-/tmp}"/madomochi_apply_test_*
            "${TMPDIR:-/tmp}"/madomochi_session_test_*
            "${TMPDIR:-/tmp}"/buddy_test_*
          )
          if (( ${#leftovers[@]} != 0 )); then
            printf 'Temporary sandbox remains: %s\n' "${leftovers[@]}"
            exit 1
          fi

      - name: Confirm repository was not modified
        if: always()
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            echo "The test modified the repository checkout."
            exit 1
          fi
